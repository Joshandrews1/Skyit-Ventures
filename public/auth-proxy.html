<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyIT Ventures - Secure Sign-In Proxy</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0d0d0d;
      color: #d1d5db;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background-color: #121212;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
    }
    .logo-container {
      margin-bottom: 24px;
    }
    .logo {
      height: 40px;
      width: auto;
      object-contain: fit;
    }
    h2 {
      margin-top: 0;
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    p {
      color: #9ca3af;
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .spinner {
      border: 3px solid #1f2937;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    .btn {
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      width: 100%;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }
    .btn:hover {
      background-color: #1d4ed8;
    }
    .btn:active {
      transform: scale(0.98);
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #status {
      margin-top: 16px;
      font-size: 0.875rem;
      color: #60a5fa;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-container">
      <img 
        src="https://firebasestorage.googleapis.com/v0/b/gen-lang-client-0122140096.firebasestorage.app/o/skyit%20logo.png?alt=media&token=639a434a-2fc0-4063-ac43-4ca872cb99ae" 
        alt="SkyIT Logo" 
        class="logo"
      />
    </div>
    <div class="spinner"></div>
    <h2 id="title">Secure Auth Connection</h2>
    <p id="description">Connecting securely with Google OAuth to verify your identity...</p>
    <div id="status">Verifying connection...</div>
    <button id="manual-btn" class="btn" style="display: none;">Sign In with Google</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script>
    // 1. Parse parameters
    const urlParams = new URLSearchParams(window.location.search);
    const targetOrigin = urlParams.get('origin');
    const origin = targetOrigin || (window.opener ? window.opener.location.origin : '*');

    // 2. Initialize Firebase using the standard project configs
    const firebaseConfig = {
      apiKey: "AIzaSyDNlpS_900fUb3yeoAAvSGUhsRA2_y9jGY",
      authDomain: "gen-lang-client-0122140096.firebaseapp.com", // Always use the pre-authorized domain
      projectId: "gen-lang-client-0122140096",
      appId: "1:79609918360:web:b4f5978e5fe912f96f31ed"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    const statusDiv = document.getElementById('status');
    const titleH2 = document.getElementById('title');
    const descP = document.getElementById('description');
    const manualBtn = document.getElementById('manual-btn');

    function updateStatus(title, desc, status, showButton = false) {
      titleH2.textContent = title;
      descP.textContent = desc;
      statusDiv.textContent = status;
      if (showButton) {
        manualBtn.style.display = 'block';
        document.querySelector('.spinner').style.display = 'none';
      } else {
        manualBtn.style.display = 'none';
        document.querySelector('.spinner').style.display = 'block';
      }
    }

    function sendBackCredentials(idToken, user) {
      if (!window.opener) {
        updateStatus("Orphaned Session", "This login helper lost contact with the main site window. Please close this tab and try logging in again.", "Error: window.opener not found", true);
        return;
      }

      updateStatus("Connected Successfully", "Returning authenticated token to your session...", "Completing auth bridge...");
      
      try {
        window.opener.postMessage({
          type: 'auth-success',
          idToken: idToken,
          user: {
            uid: user.uid,
            email: user.email,
            displayName: user.displayName,
            photoURL: user.photoURL
          }
        }, origin);
      } catch (err) {
        console.error("Failed to post message:", err);
      }

      setTimeout(() => {
        window.close();
      }, 500);
    }

    // 3. Initiate Auth Loop
    auth.getRedirectResult().then((result) => {
      if (result && result.user) {
        result.user.getIdToken().then((idToken) => {
          sendBackCredentials(idToken, result.user);
        });
      } else {
        // Check current session state
        const unsubscribe = auth.onAuthStateChanged((user) => {
          unsubscribe();
          if (user) {
            user.getIdToken().then((idToken) => {
              sendBackCredentials(idToken, user);
            });
          } else {
            // Trigger redirect OAuth flow (which runs securely inside this popup tab)
            updateStatus("Redirecting to Google", "Opening Google sign-in window inside this proxy container...", "Redirecting...");
            auth.signInWithRedirect(provider).catch((error) => {
              console.error("Sign-in redirect error:", error);
              updateStatus("Manual Verification", "Google auto-redirect could not start. Please click the button below to authenticate.", "Redirect blocked", true);
            });
          }
        });
      }
    }).catch((error) => {
      console.error("Authentication redirection error:", error);
      updateStatus("Verification Failed", "Could not complete secure identity connection: " + error.message, "OAuth Error", true);
    });

    manualBtn.addEventListener('click', () => {
      updateStatus("Redirecting to Google", "Opening Google sign-in window inside this proxy container...", "Redirecting...");
      auth.signInWithRedirect(provider).catch((error) => {
        alert("Authentication failed to launch: " + error.message);
        updateStatus("Manual Verification", "Google auto-redirect could not start. Please click the button below to authenticate.", "Error: " + error.message, true);
      });
    });
  </script>
</body>
</html>
