# Firebase App Hosting Configuration
# For more info, see: https://firebase.google.com/docs/app-hosting/configure

# Settings for the backend Cloud Run service
runConfig:
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 1024

# Environment variables for the backend server
env:
  - variable: NODE_ENV
    value: production

  # Sensitive Secrets (Configured in Google Cloud Secret Manager)
  # To use these, create matching secrets in Google Cloud Secret Manager and 
  # grant the App Hosting service account access to them.
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: FLUTTERWAVE_SECRET_KEY
    secret: FLUTTERWAVE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: GMAIL_APP_PASSWORD
    secret: GMAIL_APP_PASSWORD
    availability:
      - RUNTIME

  # Standard configuration variables (Plaintext)
  - variable: GMAIL_USER
    secret: GMAIL_USER
    availability:
      - RUNTIME
  - variable: NOTIFICATION_EMAIL_RECIPIENT
    secret: NOTIFICATION_EMAIL_RECIPIENT
    availability:
      - RUNTIME
  - variable: VITE_FLUTTERWAVE_PUBLIC_KEY
    secret: VITE_FLUTTERWAVE_PUBLIC_KEY
    availability:
      - RUNTIME
