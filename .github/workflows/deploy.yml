name: Build and Deploy to Firebase & Cloud Run

on:
  push:
    branches:
      - main # Change this to master if your primary branch is master

jobs:
  deploy:
    name: Deploy Full-Stack App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-type: 'node'
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      # Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Configure Docker with Artifact Registry / GCR
      - name: Configure Docker
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # Build and push the container image to Google Container Registry
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="gcr.io/${{ secrets.GCP_PROJECT_ID }}/skyit-ventures:latest"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      # Deploy the container to Google Cloud Run
      - name: Deploy to Cloud Run
        id: deploy-cloud-run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: skyit-ventures
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/skyit-ventures:latest
          region: europe-west2 # Set your preferred Google Cloud region
          flags: '--port=3000 --allow-unauthenticated'
          env_vars: |
            NODE_ENV=production
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            NOTIFICATION_EMAIL_RECIPIENT=${{ secrets.NOTIFICATION_EMAIL_RECIPIENT }}
            FLUTTERWAVE_SECRET_KEY=${{ secrets.FLUTTERWAVE_SECRET_KEY }}
            FLW_PROD_CLIENT_ID=${{ secrets.FLW_PROD_CLIENT_ID }}
            FLW_PROD_CLIENT_SECRET=${{ secrets.FLW_PROD_CLIENT_SECRET }}

      # Install Firebase CLI and deploy hosting settings & Firestore rules
      - name: Deploy to Firebase Hosting & Firestore Rules
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: deploy --only hosting,firestore
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
